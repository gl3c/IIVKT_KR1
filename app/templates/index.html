<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Генератор Контента</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .generated {
            white-space: pre-wrap;
            line-height: 1.6;
        }
        .type-btn {
            transition: all 0.2s ease;
        }
        .type-btn.active {
            border-color: rgb(59 130 246);
            background-color: rgb(239 246 255);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }
    </style>
</head>
<body class="bg-gray-50 py-8">
    <div class="max-w-4xl mx-auto px-4">
        <div class="text-center mb-8">
            <h1 class="text-5xl font-bold mb-2">AI Генератор Контента</h1>
        </div>

        <div class="bg-white rounded-3xl shadow-2xl p-8 md:p-10">
            <form id="form" class="space-y-8">
                <!-- Тип контента -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-3">Выберите тип контента</label>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                        <button type="button" onclick="selectType(this, 'social')" 
                                class="type-btn active flex flex-col items-center justify-center px-5 py-6 rounded-2xl border-2 border-gray-200 hover:border-blue-500 text-sm font-medium">
                            📱<br>Пост для соцсетей
                        </button>
                        <button type="button" onclick="selectType(this, 'product')" 
                                class="type-btn flex flex-col items-center justify-center px-5 py-6 rounded-2xl border-2 border-gray-200 hover:border-blue-500 text-sm font-medium">
                            🛒<br>Описание товара
                        </button>
                        <button type="button" onclick="selectType(this, 'story')" 
                                class="type-btn flex flex-col items-center justify-center px-5 py-6 rounded-2xl border-2 border-gray-200 hover:border-blue-500 text-sm font-medium">
                            📖<br>Короткий рассказ
                        </button>
                        <button type="button" onclick="selectType(this, 'seo')" 
                                class="type-btn flex flex-col items-center justify-center px-5 py-6 rounded-2xl border-2 border-gray-200 hover:border-blue-500 text-sm font-medium">
                            🔍<br>SEO-заголовки
                        </button>
                    </div>
                </div>

                <!-- Тема -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Тема или ключевые слова</label>
                    <input id="prompt" type="text" 
                           class="w-full px-5 py-4 text-lg rounded-2xl border border-gray-300 focus:border-blue-500 focus:ring-0 outline-none"
                           placeholder="Например: кофе в дождливом городе" required>
                </div>

                <!-- Настройки -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Максимальная длина</label>
                        <input id="max_length" type="number" value="300" min="50" max="1000"
                               class="w-full px-5 py-4 rounded-2xl border border-gray-300 focus:border-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Температура (креативность)</label>
                        <input id="temperature" type="number" step="0.05" value="0.85" min="0.1" max="1.5"
                               class="w-full px-5 py-4 rounded-2xl border border-gray-300 focus:border-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Количество вариантов</label>
                        <input id="num_variants" type="number" value="1" min="1" max="5"
                               class="w-full px-5 py-4 rounded-2xl border border-gray-300 focus:border-blue-500 outline-none">
                    </div>
                </div>

                <!-- Кнопка -->
                <button type="button" onclick="generateContent()" 
                        class="w-full bg-gradient-to-r from-blue-600 to-violet-600 hover:from-blue-700 hover:to-violet-700 text-white font-semibold text-xl py-5 rounded-2xl transition-all active:scale-95">
                    ✨ Сгенерировать контент
                </button>
            </form>

            <!-- Результат -->
            <div id="result" class="mt-10 hidden">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="font-semibold text-xl">Результат генерации</h3>
                    <button onclick="copyResult()" 
                            class="flex items-center gap-2 text-blue-600 hover:text-blue-700 font-medium">
                        📋 Скопировать
                    </button>
                </div>
                <div id="output" class="bg-gray-100 p-8 rounded-2xl text-lg leading-relaxed generated min-h-[200px]">
                </div>
            </div>
        </div>

        <p class="text-center text-gray-400 text-sm mt-8">
            Powered by ruGPT3Medium • FastAPI + Transformers
            Created by Alen Kaytamba
        </p>
    </div>

    <script>
        let selectedType = 'social';

        function selectType(btn, type) {
            document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            selectedType = type;
        }

        async function generateContent() {
            const promptInput = document.getElementById('prompt').value.trim();
            if (!promptInput) {
                alert("Пожалуйста, введите тему или ключевые слова!");
                return;
            }

            const maxLength = parseInt(document.getElementById('max_length').value) || 300;
            const temperature = parseFloat(document.getElementById('temperature').value) || 0.85;
            const numVariants = parseInt(document.getElementById('num_variants').value) || 1;

            const url = numVariants > 1 ? '/generate/variants' : '/generate';
            
            const body = numVariants > 1 
                ? { prompt: promptInput, max_length: maxLength, temperature: temperature, num_variants: numVariants }
                : { prompt: promptInput, max_length: maxLength, temperature: temperature, content_type: selectedType };

            const resultDiv = document.getElementById('result');
            const outputDiv = document.getElementById('output');
            
            outputDiv.innerHTML = `<p class="text-gray-500 italic">Генерируем...</p>`;
            resultDiv.classList.remove('hidden');

            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });

                const data = await res.json();

                if (data.variants && data.variants.length > 0) {
                    outputDiv.innerHTML = data.variants.map((v, i) => `
                        <div class="mb-8 border-l-4 border-blue-400 pl-4">
                            <strong class="text-blue-600">Вариант ${i+1}</strong>
                            <p class="mt-2">${v}</p>
                        </div>
                    `).join('');
                } else if (data.generated_text) {
                    outputDiv.innerHTML = `<p>${data.generated_text}</p>`;
                } else {
                    outputDiv.innerHTML = `<p class="text-red-500">Что-то пошло не так...</p>`;
                }
            } catch (err) {
                outputDiv.innerHTML = `<p class="text-red-500">Ошибка соединения с сервером</p>`;
            }
        }

        function copyResult() {
            const text = document.getElementById('output').innerText;
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.querySelector('button[onclick="copyResult()"]');
                const original = btn.innerHTML;
                btn.innerHTML = '✅ Скопировано!';
                setTimeout(() => btn.innerHTML = original, 2000);
            });
        }

        // Авто-фокус на поле ввода
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('prompt').focus();
        });
    </script>
</body>
</html>
